<!doctype html>

<!-- EGITIM-TR: CSS3 eğitimi (CSS temel konuları): '8.width-heigt' sayfası — stiller ve düzen örnekleri. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
    /* EGITIM-STIL: Bu bloktaki CSS kuralları yalnızca eğitim örneğidir. */

      div#box-1 {
        width: 50%;
        height: 100px;
        background: #a7a7a7;
      }
      div.box-2 {
        width: 50%;
        height: 50px;
        background: red;
      }
    </style>
  </head>
  <body>
    <!-- EGITIM-GOVDE: Örnek sayfa gövdesi (içerik alanı) -->

    <div id="box-1">
      <div class="box-2"></div>
    </div>
  </body>
</html>
